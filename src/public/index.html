<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0FDFA;
      color: #0F172A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      background: #fff;
      padding: 2.5rem;
      border-radius: 16px;
      border: 1px solid #E2E8F0;
      width: 100%;
      max-width: 440px;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #0F172A;
      letter-spacing: -0.025em;
    }

    h2 {
      text-align: center;
      margin-bottom: 1.25rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: #0F172A;
      letter-spacing: -0.025em;
    }

    h3 {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    label {
      display: block;
      margin-bottom: 0.375rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #475569;
    }

    input {
      width: 100%;
      height: 2.5rem;
      padding: 0 0.75rem;
      margin-bottom: 0.875rem;
      border: 1px solid #CBD5E1;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: #0F172A;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder {
      color: #94A3B8;
    }

    input:focus {
      outline: none;
      border-color: #0D9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
    }

    button {
      width: 100%;
      height: 2.625rem;
      padding: 0 1rem;
      background: #0D9488;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #0F766E;
    }

    button:disabled {
      background: #99D6D0;
      cursor: not-allowed;
    }

    .error {
      color: #DC2626;
      font-size: 0.8125rem;
      margin-top: 0.75rem;
      text-align: center;
    }

    .auth-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #E2E8F0;
      font-size: 0.8125rem;
    }

    .auth-header span {
      color: #64748B;
      margin-right: auto;
    }

    .auth-header a {
      color: #0D9488;
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.15s;
    }

    .auth-header a:hover {
      color: #0F766E;
    }

    .auth-header button {
      width: auto;
      height: auto;
      padding: 0.375rem 0.875rem;
      font-size: 0.8125rem;
      font-weight: 500;
      background: transparent;
      color: #64748B;
      border: 1px solid #CBD5E1;
      border-radius: 6px;
    }

    .auth-header button:hover {
      background: #F1F5F9;
      color: #0F172A;
    }

    .btn-row {
      display: flex;
      gap: 0.625rem;
      margin-top: 0.75rem;
    }

    .btn-row button {
      flex: 1;
    }

    .btn-secondary {
      background: transparent;
      color: #475569;
      border: 1px solid #CBD5E1;
    }

    .btn-secondary:hover {
      background: #F1F5F9;
      color: #0F172A;
    }

    .btn-secondary:disabled {
      background: transparent;
      color: #94A3B8;
      border-color: #E2E8F0;
    }

    .penalties-section {
      margin-top: 0.75rem;
      margin-bottom: 1rem;
    }

    .penalties-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.625rem;
    }

    .penalties-header label {
      margin-bottom: 0;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .penalties-header button {
      width: auto;
      height: auto;
      padding: 0.375rem 0.875rem;
      font-size: 0.8125rem;
      font-weight: 500;
      background: transparent;
      color: #0D9488;
      border: 1px solid #0D9488;
      border-radius: 6px;
    }

    .penalties-header button:hover {
      background: #F0FDFA;
    }

    .penalty-row {
      border: 1px solid #E2E8F0;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.625rem;
      position: relative;
      background: #F8FAFC;
    }

    .penalty-row .remove-btn {
      position: absolute;
      top: 0.625rem;
      right: 0.625rem;
      width: 1.75rem;
      height: 1.75rem;
      min-width: 1.75rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #94A3B8;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      font-size: 1.125rem;
      line-height: 1;
    }

    .penalty-row .remove-btn:hover {
      background: #FEF2F2;
      color: #DC2626;
      border-color: #FECACA;
    }

    .penalty-row label {
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      color: #64748B;
    }

    .penalty-row input {
      margin-bottom: 0.5rem;
      height: 2.25rem;
      font-size: 0.875rem;
      background: #fff;
    }

    .penalty-preview {
      font-size: 0.75rem;
      font-weight: 500;
      color: #0D9488;
      background: #F0FDFA;
      padding: 0.5rem 0.625rem;
      border-radius: 6px;
      margin-top: 0.25rem;
      border: 1px solid #CCFBF1;
    }

    #login-subtitle {
      text-align: center;
      margin-bottom: 1.75rem;
      color: #64748B;
      font-size: 0.9375rem;
    }

    #toggle-auth-link {
      color: #0D9488;
      font-weight: 500;
      transition: color 0.15s;
    }

    #toggle-auth-link:hover {
      color: #0F766E;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
        align-items: flex-start;
      }
      .container {
        padding: 1.5rem;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login View -->
    <div id="login-view" style="display:none;">
      <h1>Invoice Maker</h1>
      <p id="login-subtitle">Log in to your account</p>
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required>
      <label for="login-password">Password</label>
      <input type="password" id="login-password" required>
      <button id="login-btn" type="button">Log in</button>
      <p id="login-error" class="error" style="display:none;"></p>
      <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem;">
        <a id="toggle-auth-link" href="#">Don't have an account? Register</a>
      </p>
    </div>

    <!-- App View (authenticated) -->
    <div id="app-view" style="display:none;">
      <div class="auth-header">
        <span id="user-email"></span>
        <a id="settings-link">Settings</a>
        <button id="logout-btn" type="button">Logout</button>
      </div>

      <!-- Settings View -->
      <div id="settings-view" style="display:none;">
        <h2>Supplier Settings</h2>

        <label for="s-nameEN">Name (EN)</label>
        <input type="text" id="s-nameEN" required>

        <label for="s-nameUA">Name (UA)</label>
        <input type="text" id="s-nameUA" required>

        <label for="s-addressEN">Address (EN)</label>
        <input type="text" id="s-addressEN" required>

        <label for="s-addressUA">Address (UA)</label>
        <input type="text" id="s-addressUA" required>

        <label for="s-registrationCode">Registration Code</label>
        <input type="text" id="s-registrationCode" required>

        <label for="s-signatureEN">Signature (EN)</label>
        <input type="text" id="s-signatureEN" required>

        <label for="s-signatureUA">Signature (UA)</label>
        <input type="text" id="s-signatureUA" required>

        <h3>Bank Details</h3>
        <label for="s-bankBeneficiary">Beneficiary</label>
        <input type="text" id="s-bankBeneficiary" required>

        <label for="s-bankSepa">SEPA/IBAN</label>
        <input type="text" id="s-bankSepa" required>

        <label for="s-bankBic">BIC/SWIFT</label>
        <input type="text" id="s-bankBic" required>

        <label for="s-bankReceiver">Receiver Bank</label>
        <input type="text" id="s-bankReceiver" required>

        <h3>File Naming</h3>
        <label for="s-surname">Surname (for filename)</label>
        <input type="text" id="s-surname" required>

        <label for="s-customerShort">Customer Short Name (for filename)</label>
        <input type="text" id="s-customerShort" required>

        <div class="btn-row">
          <button id="save-settings-btn" type="button">Save Settings</button>
          <button id="back-to-invoice-btn" type="button" class="btn-secondary">Back</button>
        </div>
        <p id="settings-message" style="display:none; text-align:center; margin-top:0.75rem; font-size:0.875rem; font-weight:500;"></p>
      </div>

      <!-- Invoice View -->
      <div id="invoice-view" style="display:none;">
        <h1>Invoice Maker</h1>
        <form id="invoice-form">
          <label for="invoiceNumber">Invoice Number</label>
          <input type="text" id="invoiceNumber" name="invoiceNumber" placeholder="Auto">

          <label for="date">Invoice date</label>
          <input type="date" id="date" name="date" required>

          <label for="hours">Hours</label>
          <input type="number" id="hours" name="hours" value="168" min="0" step="any" required>

          <label for="rate">Hourly rate EUR</label>
          <input type="number" id="rate" name="rate" value="20" min="0" step="0.01" required>

          <div class="penalties-section">
            <div class="penalties-header">
              <label>Penalties</label>
              <button type="button" id="add-penalty-btn">+ Add Penalty</button>
            </div>
            <div id="penalty-rows"></div>
          </div>

          <button type="submit" id="submit-btn">Generate PDF</button>
          <div id="error-msg" class="error"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // === Auth State ===
      async function checkAuth() {
        try {
          var resp = await fetch("/api/auth/me");
          if (resp.ok) {
            var data = await resp.json();
            showApp(data.email);
          } else {
            showLogin();
          }
        } catch {
          showLogin();
        }
      }

      function showLogin() {
        document.getElementById("login-view").style.display = "block";
        document.getElementById("app-view").style.display = "none";
      }

      async function showApp(email) {
        document.getElementById("login-view").style.display = "none";
        document.getElementById("app-view").style.display = "block";
        document.getElementById("user-email").textContent = email;

        var settings = await loadSettings();
        if (!settings) {
          showSettings();
        } else {
          showInvoiceForm();
        }
      }

      // === Login / Register ===
      var isRegisterMode = false;
      var loginBtn = document.getElementById("login-btn");
      var toggleLink = document.getElementById("toggle-auth-link");
      var loginSubtitle = document.getElementById("login-subtitle");

      var passwordInput = document.getElementById("login-password");

      toggleLink.addEventListener("click", function (e) {
        e.preventDefault();
        isRegisterMode = !isRegisterMode;
        if (isRegisterMode) {
          loginBtn.textContent = "Register";
          loginSubtitle.textContent = "Create a new account";
          toggleLink.textContent = "Already have an account? Log in";
          passwordInput.placeholder = "Min 8 characters";
          passwordInput.minLength = 8;
        } else {
          loginBtn.textContent = "Log in";
          loginSubtitle.textContent = "Log in to your account";
          toggleLink.textContent = "Don't have an account? Register";
          passwordInput.placeholder = "";
          passwordInput.removeAttribute("minlength");
        }
        document.getElementById("login-error").style.display = "none";
      });

      var emailInput = document.getElementById("login-email");
      emailInput.addEventListener("blur", function () {
        this.value = this.value.toLowerCase().trim().replace(/\s+/g, "");
      });

      loginBtn.addEventListener("click", async function () {
        var email = emailInput.value.toLowerCase().trim().replace(/\s+/g, "");
        emailInput.value = email;
        var password = document.getElementById("login-password").value;
        if (!email || !password) return;
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById("login-error").textContent = "Invalid email address";
          document.getElementById("login-error").style.display = "block";
          return;
        }
        this.disabled = true;
        document.getElementById("login-error").style.display = "none";
        try {
          var endpoint = isRegisterMode ? "/api/auth/register" : "/api/auth/login";
          var resp = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          });
          if (resp.ok) {
            checkAuth();
          } else {
            var contentType = resp.headers.get("content-type") || "";
            if (contentType.includes("application/json")) {
              var data = await resp.json();
              throw new Error(data.error || "Authentication failed");
            } else {
              throw new Error("Server error. Please try again.");
            }
          }
        } catch (err) {
          document.getElementById("login-error").textContent = err.message;
          document.getElementById("login-error").style.display = "block";
        } finally {
          this.disabled = false;
        }
      });

      document.getElementById("logout-btn").addEventListener("click", async function () {
        await fetch("/api/auth/logout", { method: "POST" });
        showLogin();
      });

      // === Settings ===
      var settingsFields = [
        "nameEN", "nameUA", "addressEN", "addressUA", "registrationCode",
        "signatureEN", "signatureUA", "surname", "customerShort",
      ];

      async function loadSettings() {
        try {
          var resp = await fetch("/api/settings");
          if (!resp.ok) return null;
          var data = await resp.json();
          if (!data) return null;
          settingsFields.forEach(function (f) {
            var el = document.getElementById("s-" + f);
            if (el && data[f]) el.value = data[f];
          });
          if (data.bank) {
            document.getElementById("s-bankBeneficiary").value = data.bank.beneficiary || "";
            document.getElementById("s-bankSepa").value = data.bank.sepa || "";
            document.getElementById("s-bankBic").value = data.bank.bic || "";
            document.getElementById("s-bankReceiver").value = data.bank.receiver || "";
          }
          return data;
        } catch {
          return null;
        }
      }

      function collectSettings() {
        var obj = {};
        settingsFields.forEach(function (f) {
          obj[f] = document.getElementById("s-" + f).value;
        });
        obj.bank = {
          beneficiary: document.getElementById("s-bankBeneficiary").value,
          sepa: document.getElementById("s-bankSepa").value,
          bic: document.getElementById("s-bankBic").value,
          receiver: document.getElementById("s-bankReceiver").value,
        };
        return obj;
      }

      document.getElementById("save-settings-btn").addEventListener("click", async function () {
        var settings = collectSettings();
        var resp = await fetch("/api/settings", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(settings),
        });
        var msg = document.getElementById("settings-message");
        if (resp.ok) {
          msg.textContent = "Settings saved!";
          msg.style.color = "#059669";
        } else {
          msg.textContent = "Failed to save settings.";
          msg.style.color = "#DC2626";
        }
        msg.style.display = "block";
      });

      document.getElementById("settings-link").addEventListener("click", function (e) {
        e.preventDefault();
        showSettings();
      });

      document.getElementById("back-to-invoice-btn").addEventListener("click", function () {
        showInvoiceForm();
      });

      function showSettings() {
        document.getElementById("settings-view").style.display = "block";
        document.getElementById("invoice-view").style.display = "none";
        loadSettings();
      }

      function showInvoiceForm() {
        document.getElementById("settings-view").style.display = "none";
        document.getElementById("invoice-view").style.display = "block";
        loadNextInvoiceNumber();
      }

      // === Invoice Number ===
      async function loadNextInvoiceNumber() {
        try {
          var resp = await fetch("/api/counter");
          if (resp.ok) {
            var data = await resp.json();
            document.getElementById("invoiceNumber").placeholder = data.next;
          }
        } catch {}
      }

      // === Invoice Form ===
      var form = document.getElementById("invoice-form");
      var dateInput = document.getElementById("date");
      var hoursInput = document.getElementById("hours");
      var rateInput = document.getElementById("rate");
      var invoiceNumberInput = document.getElementById("invoiceNumber");
      var submitBtn = document.getElementById("submit-btn");
      var errorMsg = document.getElementById("error-msg");
      var addPenaltyBtn = document.getElementById("add-penalty-btn");
      var penaltyRowsContainer = document.getElementById("penalty-rows");

      var penaltyCounter = 0;
      var debounceTimer = null;

      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = String(today.getMonth() + 1).padStart(2, "0");
      var dd = String(today.getDate()).padStart(2, "0");
      dateInput.value = yyyy + "-" + mm + "-" + dd;

      function addPenaltyRow() {
        var id = ++penaltyCounter;
        var row = document.createElement("div");
        row.className = "penalty-row";
        row.dataset.rowId = id;
        row.innerHTML =
          '<button type="button" class="remove-btn">&times;</button>' +
          '<label>Invoice No</label>' +
          '<input type="text" class="p-invoiceNo" placeholder="5">' +
          '<label>Invoice Date</label>' +
          '<input type="date" class="p-invoiceDate">' +
          '<label>Invoice Amount (EUR)</label>' +
          '<input type="number" class="p-amount" step="0.01" min="0">' +
          '<label>Payment Received</label>' +
          '<input type="date" class="p-received">' +
          '<div class="penalty-preview" id="preview-' + id + '"></div>';

        var removeBtn = row.querySelector(".remove-btn");
        removeBtn.addEventListener("click", function () {
          row.remove();
          calculatePenalties();
        });

        var inputs = row.querySelectorAll("input");
        for (var i = 0; i < inputs.length; i++) {
          inputs[i].addEventListener("input", debouncedCalc);
        }

        penaltyRowsContainer.appendChild(row);
      }

      function getPenaltyInputs() {
        var rows = penaltyRowsContainer.querySelectorAll(".penalty-row");
        var result = [];
        for (var i = 0; i < rows.length; i++) {
          var row = rows[i];
          var invoiceNo = row.querySelector(".p-invoiceNo").value;
          var invoiceDate = row.querySelector(".p-invoiceDate").value;
          var invoiceAmount = Number(row.querySelector(".p-amount").value);
          var paymentReceivedDate = row.querySelector(".p-received").value;
          if (invoiceNo && invoiceDate && invoiceAmount && paymentReceivedDate) {
            result.push({
              invoiceNo: invoiceNo,
              invoiceDate: invoiceDate,
              invoiceAmount: invoiceAmount,
              paymentReceivedDate: paymentReceivedDate,
              rowId: row.dataset.rowId,
            });
          }
        }
        return result;
      }

      function debouncedCalc() {
        if (debounceTimer) {
          clearTimeout(debounceTimer);
        }
        debounceTimer = setTimeout(function () {
          calculatePenalties();
        }, 500);
      }

      async function calculatePenalties() {
        var inputs = getPenaltyInputs();
        if (inputs.length === 0) {
          return;
        }

        try {
          var response = await fetch("/api/calculate-penalties", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ penalties: inputs }),
          });
          if (!response.ok) return;
          var data = await response.json();
          data.penalties.forEach(function (p, i) {
            var rowId = inputs[i].rowId;
            var preview = document.getElementById("preview-" + rowId);
            if (preview) {
              preview.textContent = "Due: " + p.dueDate +
                " | Payment: " + p.actualPaymentDate +
                " | Delay: " + p.delayDays + " days" +
                " | Penalty: " + p.penaltyAmount + " EUR";
            }
          });
        } catch (e) {
          // silent fail for preview
        }
      }

      addPenaltyBtn.addEventListener("click", addPenaltyRow);

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorMsg.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Generating...";

        try {
          var body = {
            date: dateInput.value,
            hours: Number(hoursInput.value),
            rate: Number(rateInput.value),
            penalties: getPenaltyInputs(),
          };
          if (invoiceNumberInput.value.trim()) {
            body.invoiceNumber = invoiceNumberInput.value.trim();
          }

          var response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          if (!response.ok) {
            var data = await response.json();
            throw new Error(data.error || "Failed to generate invoice");
          }

          var disposition = response.headers.get("Content-Disposition");
          var fileName = "invoice.pdf";
          if (disposition && disposition.includes("filename=")) {
            var match = disposition.match(/filename="?([^";]+)"?/);
            if (match) fileName = match[1];
          }
          var blob = await response.blob();
          var url = window.URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
        } catch (err) {
          errorMsg.textContent = err.message;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Generate PDF";
        }
      });

      // === Init ===
      checkAuth();
    })();
  </script>
</body>
</html>
