<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Maker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }

    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
    }

    button {
      width: 100%;
      padding: 0.65rem;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #3a7bc8;
    }

    button:disabled {
      background: #a0c4e8;
      cursor: not-allowed;
    }

    .error {
      color: #d9534f;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Invoice Maker</h1>
    <form id="invoice-form">
      <label for="date">Invoice date</label>
      <input type="date" id="date" name="date" required>

      <label for="hours">Hours</label>
      <input type="number" id="hours" name="hours" value="168" min="1" required>

      <label for="rate">Hourly rate EUR</label>
      <input type="number" id="rate" name="rate" value="20" min="1" required>

      <button type="submit" id="submit-btn">Generate PDF</button>
      <div id="error-msg" class="error"></div>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById("invoice-form");
      const dateInput = document.getElementById("date");
      const hoursInput = document.getElementById("hours");
      const rateInput = document.getElementById("rate");
      const submitBtn = document.getElementById("submit-btn");
      const errorMsg = document.getElementById("error-msg");

      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      dateInput.value = yyyy + "-" + mm + "-" + dd;

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorMsg.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Generating...";

        try {
          const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              date: dateInput.value,
              hours: Number(hoursInput.value),
              rate: Number(rateInput.value),
            }),
          });

          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || "Failed to generate invoice");
          }

          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = response.headers.get("Content-Disposition")
            ? response.headers.get("Content-Disposition").split("filename=")[1]
            : "invoice.pdf";
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
        } catch (err) {
          errorMsg.textContent = err.message;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Generate PDF";
        }
      });
    })();
  </script>
</body>
</html>
